---
# agent role：目录、venv、代码、.env、systemd service

# ── 目录 ─────────────────────────────────────────────────────
- name: "[目录] 创建应用目录"
  tags: [setup, deploy]
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/skills"
    - "{{ web_root_path }}"


# ── 上传代码 ──────────────────────────────────────────────────
- name: "[代码] 上传 requirements.txt"
  tags: [setup, deploy]
  copy:
    src: ../../../agent/requirements.txt
    dest: "{{ app_dir }}/requirements.txt"
    mode: '0644'
  notify: restart agent

- name: "[代码] 批量上传业务脚本"
  tags: [deploy]
  copy:
    src: "../../../agent/{{ item }}"
    dest: "{{ app_dir }}/{{ item }}"
    mode: '0644'
  loop:
    - agent.py
    - state.py
  notify: restart agent
  

- name: "[代码] 同步所有 Skills 脚本"
  tags: [deploy]
  copy:
    src: "../../../agent/skills/"  # 注意：末尾带斜杠表示同步目录下的“内容”
    dest: "{{ app_dir }}/skills/"
    mode: '0644'
  notify: restart agent
  
  

# ── venv + 依赖 ───────────────────────────────────────────────
- name: "[venv] 检查是否存在"
  tags: [setup]
  stat:
    path: "{{ app_dir }}/venv/bin/activate"
  register: venv_stat

- name: "[venv] 创建 Python 3.9 venv"
  tags: [setup]
  command: /usr/bin/python3.9 -m venv {{ app_dir }}/venv
  when: not venv_stat.stat.exists

- name: "[venv] 升级 pip"
  tags: [setup]
  pip:
    name: pip
    state: latest
    virtualenv: "{{ app_dir }}/venv"
    extra_args: "--no-cache-dir"

- name: "[venv] 安装依赖"
  tags: [setup, deploy]
  pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/venv"
    extra_args: "--no-cache-dir"
  notify: restart agent

# ── .env（secrets 注入，文件权限 600）────────────────────────
- name: "[secrets] 生成 .env"
  tags: [deploy, secrets]
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    mode: '0600'
  notify: restart agent

# ── systemd service ───────────────────────────────────────────
- name: "[service] 安装 systemd unit"
  tags: [setup, deploy]
  template:
    src: invest-agent.service.j2
    dest: "/etc/systemd/system/{{ service_name }}.service"
    mode: '0644'
  notify:
    - reload systemd
    - restart agent

- name: "[service] 启用并启动"
  tags: [setup, deploy]
  systemd:
    name: "{{ service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: "[service] 确认运行状态"
  tags: [deploy, check]
  command: systemctl status {{ service_name }} --no-pager -l
  register: svc_status
  changed_when: false
  failed_when: false

- name: "Service 状态"
  tags: [deploy, check]
  debug:
    msg: "{{ svc_status.stdout_lines }}"
